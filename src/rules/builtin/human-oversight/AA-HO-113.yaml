id: AA-HO-113
info:
  name: "No quorum enforcement"
  domain: human-oversight
  severity: high
  confidence: low
  description: "Multi-party approval is defined but quorum requirements are not enforced. The system does not verify that the minimum number of approvers have signed off before proceeding."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.1, GOVERN-1.2]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.2, A.6.2]
check:
  type: code_matches
  pattern: "\\b(approvers|approval_count|approvals)\\b(?!.*\\b(quorum|minimum|required_count|threshold|min_approvers)\\b)"
  language: any
  message: "Multi-party approval lacks quorum enforcement"
