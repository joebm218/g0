id: AA-HO-086
info:
  name: "Audit log tampering possible"
  domain: human-oversight
  severity: critical
  confidence: medium
  description: "Audit logs can be modified, deleted, or cleared by the agent itself or by processes with the same privilege level. Logs must be protected from tampering by the system they monitor."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-4.1]
    eu_ai_act: [Art12-1]
    iso42001: [A.6.2, A.8.4]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'clear_logs|delete_logs|purge_audit|remove_history|wipe_records'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Audit log deletion without human authorization"
