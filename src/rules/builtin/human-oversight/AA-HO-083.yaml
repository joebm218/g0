id: AA-HO-083
info:
  name: "No immutable audit log"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Audit logs are stored in a mutable format that can be modified or deleted. Audit logs should be append-only or stored in an immutable store to prevent tampering."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-4.1]
    eu_ai_act: [Art12-1]
    iso42001: [A.6.2, A.8.4]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'writeFile|write_file|fs\.write|save_file|create_file'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Persistent file write without human review"
