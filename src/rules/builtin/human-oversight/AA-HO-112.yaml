id: AA-HO-112
info:
  name: "Missing approval expiry"
  domain: human-oversight
  severity: medium
  confidence: low
  description: "Approvals do not expire after a defined time window. Stale approvals can be used long after the context that justified them has changed, creating security risks."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.1]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.2]
check:
  type: code_matches
  pattern: "\\bapprov\\w+\\b(?!.*\\b(expir|ttl|timeout|valid_until|expires_at|max_age)\\b)"
  language: any
  message: "Approval granted without expiration time"
