id: AA-HO-095
info:
  name: "No escalation policy defined"
  domain: human-oversight
  severity: medium
  confidence: low
  description: "Agent has no escalation policy for handling situations that exceed its capabilities or authority. An escalation policy must define when and how issues are routed to human operators."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-4.1]
    eu_ai_act: [Art14-1, Art14-3]
    iso42001: [A.8.2, A.6.2]
check:
  type: prompt_missing
  pattern: "escalation_policy|escalation_rules|escalate|escalation_config|on_failure_escalate"
  language: any
  message: "No escalation policy defined for the agent"
