id: AA-HO-082
info:
  name: "Incomplete audit records"
  domain: human-oversight
  severity: medium
  confidence: low
  description: "Audit log entries are missing critical fields such as action type, target resource, outcome, or context. Incomplete records undermine forensic analysis and compliance requirements."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    eu_ai_act: [Art12-1]
    iso42001: [A.6.2]
check:
  type: code_matches
  pattern: "\\b(log|audit|record)\\b.*\\{(?!.*\\b(action|target|result|status|outcome)\\b)"
  language: any
  message: "Audit log entry missing critical fields (action, target, result)"
