id: AA-HO-118
info:
  name: "No approval for configuration changes"
  domain: human-oversight
  severity: high
  confidence: high
  description: "Agent configuration can be modified without approval. Changes to agent behavior, permissions, connected tools, or operational parameters should require human approval."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI01]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-2.2]
    eu_ai_act: [Art14-1, Art14-4]
    iso42001: [A.8.2, A.8.4]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'update_config|modify_config|set_config|change_settings'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Configuration change without human review"
