id: AA-HO-107
info:
  name: "Stale consent used"
  domain: human-oversight
  severity: medium
  confidence: low
  description: "Agent relies on previously obtained consent without checking its validity or expiry. Consent should be periodically revalidated, especially when data practices or scope change."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.1]
    eu_ai_act: [Art14-1, Art15-1]
    iso42001: [A.8.5]
check:
  type: code_matches
  pattern: "\\bconsent\\b.*\\b(cached|stored|previous|old|existing)\\b(?!.*\\b(refresh|revalidate|expire|renew|check_age)\\b)"
  language: any
  message: "Stale consent used without revalidation or expiry check"
