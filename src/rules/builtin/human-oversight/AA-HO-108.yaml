id: AA-HO-108
info:
  name: "No re-consent on scope change"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent expands its data collection or processing scope without requesting renewed consent from users. Any material change in data usage requires fresh user consent."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MAP-1.5]
    eu_ai_act: [Art14-1, Art15-1]
    iso42001: [A.8.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'expand_scope|widen_scope|increase_permissions|add_permissions|elevate'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Scope expansion without human approval"
