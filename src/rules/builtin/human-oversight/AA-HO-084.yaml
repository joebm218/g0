id: AA-HO-084
info:
  name: "Missing audit for tool invocations"
  domain: human-oversight
  severity: high
  confidence: high
  description: "Tool invocations by the agent are not audited. Every tool call, including its parameters and result, should be logged to maintain a complete chain of custody."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.2]
    eu_ai_act: [Art14-4, Art12-1]
    iso42001: [A.6.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'tool_call|run_tool|invoke_tool|call_tool|use_tool'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool call without human authorization check"
