id: AA-HO-114
info:
  name: "Approval without authentication"
  domain: human-oversight
  severity: critical
  confidence: low
  description: "Approval actions can be performed without verifying the identity of the approver. Approvals must require authenticated identity to prevent unauthorized parties from granting approvals."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-2.2]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.2, A.8.3]
check:
  type: code_matches
  pattern: "\\bapprov\\w+\\b(?!.*\\b(auth|identity|verify|token|session|credentials|signed|certificate)\\b)"
  language: any
  message: "Approval action does not verify approver identity"
