id: AA-HO-075
info:
  name: "No human review for external API calls"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent makes external API calls (HTTP requests, webhook triggers, third-party service calls) without human review. External calls can exfiltrate data or trigger unintended side effects."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-2.2]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.4]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'fetch|axios|requests\.(get|post|put|delete|patch)|http\.request|urllib|httpx'
  context:
    not_in: [comment, string_literal, decorator]
  message: "External API call made without human review gate"
