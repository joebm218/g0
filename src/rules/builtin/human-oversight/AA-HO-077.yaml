id: AA-HO-077
info:
  name: "No HITL for financial transactions"
  domain: human-oversight
  severity: critical
  confidence: high
  description: "Agent initiates financial transactions (payments, transfers, refunds, charges) without human-in-the-loop approval. Financial operations must always require explicit human authorization."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI01]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-2.4]
    eu_ai_act: [Art14-1, Art14-3]
    iso42001: [A.8.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'payment|charge|transfer|withdraw|process_payment|create_invoice'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Financial transaction without human approval"
