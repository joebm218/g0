id: AA-IA-070
info:
  name: "Agent sessions have no expiry or rotation configured"
  domain: identity-access
  severity: medium
  confidence: low
  description: "Agent sessions have no expiry or rotation configured. Long-lived sessions increase the window for session hijacking and replay attacks."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(?:session|Session)\\s*\\((?!.*\\b(?:expir|ttl|max_age|timeout|lifetime|rotate|refresh)\\b)"
  language: any
  message: "Session created without expiry or rotation configuration"
