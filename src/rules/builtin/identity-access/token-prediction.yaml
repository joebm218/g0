id: AA-IA-077
info:
  name: "Predictable token generation"
  domain: identity-access
  severity: critical
  confidence: medium
  description: "Authentication tokens are generated using predictable methods (sequential IDs, timestamps, weak random). An attacker can predict valid tokens and gain unauthorized access."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'uuid1|time\.time|datetime\.now|counter|random\.randint|Math\.random'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Token generated with predictable method — token prediction risk"
