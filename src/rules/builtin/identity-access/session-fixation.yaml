id: AA-IA-076
info:
  name: "Session fixation vulnerability"
  domain: identity-access
  severity: high
  confidence: medium
  description: "Session ID is not regenerated after authentication. An attacker can fix a known session ID before the user logs in, then use that ID to hijack the authenticated session."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'login|authenticate|sign_in'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Session not regenerated after authentication — session fixation risk"
