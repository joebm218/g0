id: AA-IA-094
info:
  name: "Agent delegation without re-authentication"
  domain: identity-access
  severity: high
  confidence: low
  description: "Agent delegates tasks to sub-agents or tools without re-authenticating or verifying the delegation is authorized. This can enable unauthorized lateral movement across agent boundaries."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(delegate|invoke_agent|call_agent|sub_agent)\\((?!.*auth|.*token|.*verify|.*credential)"
  language: any
  message: "Agent delegation without re-authentication"
