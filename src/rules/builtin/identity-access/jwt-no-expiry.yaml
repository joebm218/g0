id: AA-IA-083
info:
  name: "JWT without expiry claim"
  domain: identity-access
  severity: high
  confidence: high
  description: "JWT tokens are created without an expiration (exp) claim. Non-expiring tokens remain valid indefinitely, making stolen tokens permanently usable."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'jwt\.encode|jwt\.sign|jsonwebtoken'
  context:
    not_in: [comment, string_literal, decorator]
  message: "JWT created without expiration — permanent token risk"
