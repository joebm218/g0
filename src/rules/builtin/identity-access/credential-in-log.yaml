id: AA-IA-087
info:
  name: "Credentials logged in plaintext"
  domain: identity-access
  severity: critical
  confidence: high
  description: "Authentication credentials (passwords, tokens, keys) are logged in plaintext. Log files may be accessible to unauthorized parties, exposing credentials."
  frameworks: [all]
  owasp_agentic: [ASI03, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'log(ger)?\.(info|debug|warn|error)'
    - field: arguments
      pattern: 'password|token|secret|api_key|credential|private_key'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Credentials logged in plaintext — exposure risk"
