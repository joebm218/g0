id: AA-IA-091
info:
  name: "Plaintext password storage"
  domain: identity-access
  severity: critical
  confidence: low
  description: "Passwords are stored in plaintext rather than hashed. A database breach exposes all user passwords directly."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(password|passwd)\\s*=\\s*(input|request|body)\\.password(?!.*hash|.*bcrypt|.*argon|.*scrypt|.*pbkdf)"
  language: any
  message: "Password stored without hashing — plaintext storage risk"
