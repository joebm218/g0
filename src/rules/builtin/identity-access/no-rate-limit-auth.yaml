id: AA-IA-086
info:
  name: "No rate limit on authentication endpoint"
  domain: identity-access
  severity: high
  confidence: medium
  description: "Authentication endpoint lacks rate limiting, enabling brute-force and credential stuffing attacks against agent authentication."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'login|authenticate|sign_in'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Auth endpoint without rate limiting — brute-force risk"
