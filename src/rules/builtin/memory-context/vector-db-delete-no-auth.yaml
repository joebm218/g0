id: AA-MP-127
info:
  name: "Vector database delete without authorization"
  domain: memory-context
  severity: critical
  confidence: low
  description: "Vector database entries can be deleted without authorization check. An attacker could selectively delete documents to bias retrieval results."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(delete|remove)\\(.*id|collection\\.delete(?!.*auth|.*permission|.*admin)"
  language: any
  message: "Vector database delete without authorization"
