id: AA-MP-081
info:
  name: "Persistent memory stored without encryption"
  domain: memory-context
  severity: high
  confidence: low
  description: "Agent persistent memory (files, database) stores conversation history or user data without encryption. An attacker who accesses storage can read all historical interactions."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(save_memory|persist|dump|save_to_file|write_memory)\\((?!.*encrypt|.*cipher|.*aes)"
  language: any
  message: "Memory persisted without encryption — data exposure risk"
