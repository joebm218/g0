id: AA-MP-079
info:
  name: "Knowledge base corruption via bulk update"
  domain: memory-context
  severity: critical
  confidence: medium
  description: "Knowledge base allows bulk updates or replacements without integrity checks. An attacker who gains write access can replace the entire knowledge base with adversarial content."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'delete_collection|drop_collection|clear_index|delete_index|reset_vectorstore'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Knowledge base deletion without safeguards — data loss risk"
