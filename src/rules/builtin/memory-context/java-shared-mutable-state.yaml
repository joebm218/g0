id: AA-MC-080
info:
  name: "Shared mutable state in Java agent"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Static mutable fields (non-final static collections, shared Maps) in agent code. Shared state between requests leads to cross-user data leakage and race conditions."
  frameworks: [all]
  owasp_agentic: [ASI08]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "static\\s+(?!final)\\s*(Map|List|Set|HashMap|ArrayList|ConcurrentHashMap|Queue)\\s*<"
  language: java
  message: "Shared mutable state — cross-user data leakage risk"
