id: AA-MP-105
info:
  name: "RAG query without sanitization"
  domain: memory-context
  severity: high
  confidence: low
  description: "User queries are passed directly to the vector store search without sanitization. Adversarial queries can manipulate retrieval to return specific poisoned documents."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "similarity_search\\(\\s*(query|user_input|question|input)(?!.*sanitize|.*clean|.*filter)"
  language: any
  message: "User query passed to vector search without sanitization"
