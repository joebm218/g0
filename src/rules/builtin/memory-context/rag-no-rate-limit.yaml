id: AA-MP-111
info:
  name: "RAG indexing without rate limiting"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Document indexing into the RAG system is not rate-limited. An attacker can flood the index with poisoned documents, overwhelming legitimate content."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(add_documents|index|ingest)\\((?!.*rate_limit|.*throttle|.*queue|.*batch_limit)"
  language: any
  message: "RAG indexing without rate limiting — flooding risk"
