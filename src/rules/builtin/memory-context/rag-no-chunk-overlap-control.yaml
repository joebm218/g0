id: AA-MP-125
info:
  name: "RAG chunking without overlap control"
  domain: memory-context
  severity: low
  confidence: low
  description: "Document chunking does not control overlap between chunks. Without overlap control, injection payloads split across chunk boundaries may be reassembled during retrieval."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(TextSplitter|CharacterTextSplitter|RecursiveCharacter)\\((?!.*chunk_overlap)"
  language: any
  message: "Document chunking without overlap control"
