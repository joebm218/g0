id: AA-MP-113
info:
  name: "RAG cross-tenant retrieval"
  domain: memory-context
  severity: critical
  confidence: low
  description: "RAG retrieval does not enforce tenant isolation. Documents from one tenant's knowledge base may be retrieved for queries from another tenant."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI03]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(vectorstore|retriever|index)\\.(search|query|retrieve)\\((?!.*tenant|.*namespace|.*collection)"
  language: any
  message: "RAG retrieval without tenant isolation — cross-tenant data leak"
