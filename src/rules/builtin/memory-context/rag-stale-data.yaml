id: AA-MP-100
info:
  name: "RAG knowledge base without freshness check"
  domain: memory-context
  severity: low
  confidence: low
  description: "RAG knowledge base has no mechanism to check data freshness. Stale data can lead to incorrect responses, and old poisoned documents persist indefinitely."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(load_index|from_persist|load_from_disk)\\((?!.*refresh|.*update|.*timestamp|.*version)"
  language: any
  message: "Knowledge base loaded without freshness check"
