id: AA-MP-097
info:
  name: "RAG retrieval without access control"
  domain: memory-context
  severity: high
  confidence: low
  description: "RAG retrieval does not filter documents based on user permissions. A user may retrieve documents they are not authorized to see, leading to information disclosure."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI03]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(retriever|similarity_search|search)\\((?!.*filter.*user|.*permission|.*access|.*acl)"
  language: any
  message: "RAG retrieval without user-level access control"
