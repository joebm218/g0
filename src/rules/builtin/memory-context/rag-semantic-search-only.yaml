id: AA-MP-129
info:
  name: "RAG uses only semantic search"
  domain: memory-context
  severity: low
  confidence: low
  description: "RAG system relies solely on semantic similarity for retrieval without hybrid search. Pure semantic search is more vulnerable to adversarial embedding manipulation."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'similarity_search|vector_search|semantic_search'
  context:
    not_in: [comment, string_literal, decorator]
  message: "RAG uses only semantic search without keyword fallback"
