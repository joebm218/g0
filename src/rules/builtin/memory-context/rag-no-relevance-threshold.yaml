id: AA-MP-133
info:
  name: "RAG retrieval without relevance threshold"
  domain: memory-context
  severity: medium
  confidence: low
  description: "RAG retrieval returns results without a minimum relevance score threshold. Low-relevance results are more likely to be irrelevant or poisoned content."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "similarity_search\\((?!.*score_threshold|.*min_score|.*threshold)"
  language: any
  message: "RAG retrieval without relevance threshold — noise and poisoning risk"
