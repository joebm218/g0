id: AA-MP-122
info:
  name: "PII stored in agent memory"
  domain: memory-context
  severity: high
  confidence: low
  description: "Agent memory may store PII (names, emails, phone numbers, addresses) from conversations. Stored PII increases regulatory risk and exposure in case of memory leak."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
    eu_ai_act: [Article 14]
check:
  type: code_matches
  pattern: "memory\\.(save|add|store).*(?!.*redact|.*mask|.*anonymize|.*pii_filter)"
  language: any
  message: "Memory stores data without PII redaction"
