id: AA-MP-131
info:
  name: "RAG accepts unrestricted document types"
  domain: memory-context
  severity: medium
  confidence: low
  description: "RAG system accepts any document type without restriction. Certain document types (HTML, SVG, XML) are more susceptible to carrying injection payloads."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(DirectoryLoader|UnstructuredFileLoader|load_file)\\((?!.*allowed_types|.*file_type|.*glob=.*\\.txt)"
  language: any
  message: "RAG accepts unrestricted document types — injection via document format"
