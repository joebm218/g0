id: AA-MP-069
info:
  name: "Shared memory between agents"
  domain: memory-context
  severity: high
  confidence: low
  description: "Agents share a common memory pool or global context. A compromised agent can write malicious content into shared memory, contaminating the context of other agents and enabling cross-agent prompt injection or privilege escalation."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "shared_?memory|global_?memory|common_?context|memory_?pool"
  language: any
  message: "Shared memory between agents — risk of cross-contamination"
