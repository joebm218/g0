id: AA-MP-073
info:
  name: "RAG poisoning via document injection"
  domain: memory-context
  severity: critical
  confidence: low
  description: "Documents are added to the RAG knowledge base without content scanning for prompt injection payloads. An attacker can poison the knowledge base with documents containing adversarial instructions."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0049]
check:
  type: code_matches
  pattern: "(add_documents|add_texts|upsert|ingest|index_documents)\\((?!.*scan|.*filter|.*validate|.*sanitize)"
  language: any
  message: "Documents added to RAG without content scanning — poisoning risk"
