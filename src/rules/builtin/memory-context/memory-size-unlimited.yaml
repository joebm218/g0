id: AA-MP-099
info:
  name: "Unlimited memory size"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Agent memory has no size limit. An attacker can fill memory with large amounts of data, causing performance degradation or memory exhaustion."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(ConversationBufferMemory|ChatMessageHistory)\\((?!.*max_token|.*k=|.*limit|.*max_)"
  language: any
  message: "Memory has no size limit — resource exhaustion risk"
