id: AA-MP-121
info:
  name: "RAG embedding cache poisoning"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Embedding cache does not validate cached values. An attacker who modifies the embedding cache can redirect retrieval queries to poisoned documents."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(embedding_cache|cache_embeddings|cached_embed)(?!.*hash|.*sign|.*verify)"
  language: any
  message: "Embedding cache without integrity validation — cache poisoning risk"
