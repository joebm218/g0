id: AA-MP-065
info:
  name: "No session isolation between conversations"
  domain: memory-context
  severity: high
  confidence: low
  description: "Agent does not enforce session isolation between separate conversations. Without isolation, memory or context from one user session can leak into another, enabling cross-session data exfiltration or context poisoning attacks."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(?:global|shared|singleton)\\s*(?:memory|history|context|state)\\b|memory\\s*=\\s*(?:ConversationBufferMemory|ChatMessageHistory)\\s*\\(\\s*\\)"
  language: any
  message: "Shared/global memory without session isolation"
