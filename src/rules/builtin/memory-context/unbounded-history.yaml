id: AA-MP-064
info:
  name: "Unbounded conversation history"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Conversation history grows without bound using buffer memory or uncapped append operations. Unbounded history risks context window overflow, which can cause the agent to lose its system prompt or critical instructions, enabling prompt injection via context displacement."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "ConversationBufferMemory|messages\\.append|chat_history\\.append"
  language: any
  message: "Unbounded conversation history — risk of context overflow"
