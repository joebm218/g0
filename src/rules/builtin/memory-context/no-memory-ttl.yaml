id: AA-MP-066
info:
  name: "No TTL configured for stored memories"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Agent memory has no time-to-live (TTL) or expiration configured. Without TTL, stale or poisoned memories persist indefinitely, increasing the attack surface for delayed prompt injection and accumulating sensitive data beyond its useful lifetime."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(?:ConversationBufferMemory|ChatMessageHistory|InMemoryChatMessageHistory|MemorySaver)\\s*\\((?!.*\\b(?:ttl|expire|max_age|max_messages|retention|cleanup)\\b)"
  language: any
  message: "Memory store configured without TTL or expiration"
