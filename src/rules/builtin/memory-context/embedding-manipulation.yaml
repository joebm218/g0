id: AA-MP-078
info:
  name: "Embedding manipulation via adversarial input"
  domain: memory-context
  severity: high
  confidence: low
  description: "Embedding vectors are generated from user input without adversarial input detection. Specially crafted inputs can produce embeddings that are close to target documents, manipulating retrieval."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0043]
check:
  type: code_matches
  pattern: "(embed|encode|embedding)\\(.*user_input|embed_query\\(.*input(?!.*adversarial|.*detect|.*filter)"
  language: any
  message: "Embeddings generated from user input without adversarial detection"
