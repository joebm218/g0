id: AA-MP-118
info:
  name: "RAG response without grounding check"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Agent generates RAG responses without verifying that the answer is grounded in retrieved documents. Without grounding, the agent may hallucinate and produce incorrect information."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(RetrievalQA|ConversationalRetrievalChain|retrieve_and_generate)\\((?!.*grounding|.*citation|.*verify|.*faithful)"
  language: any
  message: "RAG response without grounding verification"
