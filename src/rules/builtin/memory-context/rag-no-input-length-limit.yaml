id: AA-MP-135
info:
  name: "RAG accepts unlimited input document size"
  domain: memory-context
  severity: medium
  confidence: low
  description: "RAG system accepts documents of any size for indexing. Extremely large documents can exhaust memory, slow down indexing, and provide more surface area for injection."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(load|ingest|add_documents|index)\\((?!.*max_size|.*size_limit|.*max_length|.*file_size)"
  language: any
  message: "RAG accepts unlimited document size — resource exhaustion risk"
