id: AA-MP-085
info:
  name: "Vector database connection unencrypted"
  domain: memory-context
  severity: high
  confidence: low
  description: "Vector database connection does not use TLS/SSL encryption. Network traffic containing embeddings and documents can be intercepted or modified."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(Chroma|Qdrant|Milvus|Weaviate)\\(.*host.*(?!.*ssl|.*tls|.*https|.*grpcs)"
  language: any
  message: "Vector database connection without encryption — MITM risk"
