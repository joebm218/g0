id: AA-MP-112
info:
  name: "Memory loaded without integrity check"
  domain: memory-context
  severity: high
  confidence: low
  description: "Persisted memory is loaded without integrity verification. An attacker who modifies the memory file can inject content that influences all future interactions."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(load_memory|load_from_file|read_memory|restore_memory)\\((?!.*hash|.*checksum|.*sign|.*verify)"
  language: any
  message: "Memory loaded without integrity check — tampering risk"
