id: AA-IC-110
info:
  name: "Shared memory without locking mechanism"
  domain: inter-agent
  severity: high
  confidence: low
  description: "Agents share a memory store (vector DB, key-value store) without locking or mutual exclusion, risking data corruption under concurrent access."
  frameworks: [all]
  owasp_agentic: [ASI08]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "shared_memory|memory_store\\.write|vector_store\\.add|common_store\\.put|global_memory"
  language: any
  message: "Shared memory store accessed without locking or mutual exclusion"
