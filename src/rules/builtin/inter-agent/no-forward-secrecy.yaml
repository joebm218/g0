id: AA-IC-141
info:
  name: "No forward secrecy for agent channels"
  domain: inter-agent
  severity: medium
  confidence: low
  description: "Agent communication channels do not use forward secrecy (e.g., ECDHE), meaning compromise of long-term keys exposes all past communications."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "RSA_WITH_AES|static_key_exchange|no_pfs|disable_ecdhe|fixed_key_exchange"
  language: any
  message: "Agent communication lacks forward secrecy key exchange"
