id: AA-IC-104
info:
  name: "Admin role shared across agents"
  domain: inter-agent
  severity: critical
  confidence: low
  description: "Multiple agents share an admin or superuser role, meaning any compromised agent has full administrative access to the entire multi-agent system."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [GOVERN-6.1, GOVERN-1.2]
check:
  type: code_matches
  pattern: "(?:agent|bot|llm|assistant)\\w*\\s*[\\[.]\\s*(?:role|permission)\\s*[=:]\\s*[\"'](?:admin|superuser|root)|(?:is_admin|god_mode|root_agent)\\s*[=:]\\s*(?:True|true|1)(?!.*\\b(?:test|spec|mock|fixture)\\b)"
  language: any
  message: "Admin or superuser role assigned to agent without isolation"
