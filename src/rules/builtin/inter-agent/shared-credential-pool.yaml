id: AA-IC-098
info:
  name: "Shared credential pool between agents"
  domain: inter-agent
  severity: critical
  confidence: low
  description: "Multiple agents share the same credential store or API keys, meaning compromise of one agent exposes credentials used by all agents in the pool."
  frameworks: [all]
  owasp_agentic: [ASI05, ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MAP-3.5]
check:
  type: code_matches
  pattern: "shared_credentials|common_api_key|global_secret|shared_token_store|agent_pool_key"
  language: any
  message: "Agents share a common credential pool without isolation"
