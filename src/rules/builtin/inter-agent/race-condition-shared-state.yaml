id: AA-IC-107
info:
  name: "Race condition in shared agent state"
  domain: inter-agent
  severity: high
  confidence: low
  description: "Multiple agents can concurrently modify shared state without atomic operations, creating time-of-check-to-time-of-use (TOCTOU) vulnerabilities."
  frameworks: [all]
  owasp_agentic: [ASI08, ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "read_state.*write_state|get_state.*set_state|check.*then.*update|state\\.get.*state\\.set"
  language: any
  message: "Non-atomic read-then-write pattern on shared agent state"
