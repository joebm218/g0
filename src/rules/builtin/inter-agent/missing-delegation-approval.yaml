id: AA-IC-091
info:
  name: "Missing delegation approval mechanism"
  domain: inter-agent
  severity: high
  confidence: low
  description: "Delegated tasks are executed without approval from the receiving agent or a supervisory authority, allowing agents to be forced into executing arbitrary tasks."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-6.1, GOVERN-1.4]
check:
  type: code_matches
  pattern: "auto_accept_delegation|accept_all_tasks|skip_approval|delegation_auto"
  language: any
  message: "Delegation requests are auto-accepted without approval flow"
