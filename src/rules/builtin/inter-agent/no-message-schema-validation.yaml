id: AA-IC-086
info:
  name: "No message schema validation"
  domain: inter-agent
  severity: medium
  confidence: high
  description: "Inter-agent messages are not validated against a schema, allowing malformed or malicious payloads to be processed by receiving agents."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI03]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'JSON\.parse'
    - field: arguments
      pattern: 'agent|message|payload'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Inter-agent message parsed without schema validation"
