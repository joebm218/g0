id: AA-IC-122
info:
  name: "No message format validation"
  domain: inter-agent
  severity: medium
  confidence: high
  description: "Incoming inter-agent messages are processed without validating their format or structure, allowing injection of malformed payloads."
  frameworks: [all]
  owasp_agentic: [ASI03, ASI01]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: 'message\.content|msg\.body|payload\.data'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Inter-agent message accessed without format validation"
