id: AA-CF-076
info:
  name: "Cascading timeout failures"
  domain: cascading-failures
  severity: high
  confidence: low
  description: "Downstream service timeouts are not isolated, causing cascading failures. When one service times out, it blocks the calling service, propagating the failure chain."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "await.*(service|api|client)\\.(call|invoke|request)\\((?!.*timeout|.*Promise\\.race|.*AbortController)"
  language: any
  message: "External service call without independent timeout — cascading failure risk"
