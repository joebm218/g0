id: AA-CF-074
info:
  name: "Reasoning DoS via complex prompt"
  domain: cascading-failures
  severity: high
  confidence: low
  description: "Agent processes complex reasoning tasks without computation limits. An attacker can craft prompts requiring exponential reasoning steps, causing extended processing times and resource exhaustion."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "(chain_of_thought|reasoning|think_step|multi_step)\\((?!.*max_steps|.*timeout|.*limit|.*budget)"
  language: any
  message: "Complex reasoning without computation limits — reasoning DoS risk"
