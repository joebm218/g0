id: AA-CF-071
info:
  name: "No graceful shutdown handler for long-running agent"
  domain: cascading-failures
  severity: low
  confidence: low
  description: "No graceful shutdown handler is configured for a long-running agent process. Without proper shutdown handling, abrupt termination can leave resources locked, connections open, and downstream systems in an inconsistent state."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: agent_property
  property: hasGracefulShutdown
  condition: missing
  message: "No graceful shutdown handler for long-running agent"
