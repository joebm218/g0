id: AA-CF-079
info:
  name: "No bulkhead isolation pattern"
  domain: cascading-failures
  severity: medium
  confidence: low
  description: "Agent does not implement bulkhead isolation between different tool types or services. A failure in one tool type can consume all resources and block other tools."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "tools\\s*=\\s*\\[.*\\](?!.*bulkhead|.*isolation|.*semaphore|.*partition)"
  language: any
  message: "Tools without bulkhead isolation — cascading failure risk"
