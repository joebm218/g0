id: AA-CF-062
info:
  name: "No circuit breaker pattern for external service calls"
  domain: cascading-failures
  severity: medium
  confidence: medium
  description: "No circuit breaker pattern detected for external service calls. Without a circuit breaker, repeated failures in downstream services propagate upward, causing cascading failures across the agent system."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "(?:requests\\.(?:get|post|put|delete)|fetch\\(|axios\\.|httpx\\.|urllib\\.request)(?!.*\\b(?:circuit_?breaker|CircuitBreaker|breaker|pybreaker|resilience4j|polly|cockatiel)\\b)"
  language: any
  message: "External HTTP calls without circuit breaker pattern"
