id: AA-CF-067
info:
  name: "Recursive agent call pattern detected"
  domain: cascading-failures
  severity: high
  confidence: medium
  description: "A recursive agent invocation pattern is detected where an agent calls itself directly or indirectly. This risks stack overflow, unbounded execution depth, and cascading resource exhaustion."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'agent\.invoke|self\.run'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Recursive agent call pattern — risk of stack overflow"
