id: AA-CF-030
info:
  name: "Missing context timeout in Go LLM call"
  domain: cascading-failures
  severity: medium
  confidence: low
  description: "context.Background() or context.TODO() used without timeout/deadline for LLM API calls. Without timeouts, a slow LLM response can block the agent indefinitely."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "context\\.(Background|TODO)\\(\\)(?!.*WithTimeout|.*WithDeadline|.*WithCancel).*(?:llms\\.|openai\\.|genai\\.|Call\\(|Generate\\()"
  language: go
  message: "Missing context timeout in LLM call — indefinite blocking risk"
