id: AA-CF-072
info:
  name: "Potentially unhandled promise rejection"
  domain: cascading-failures
  severity: medium
  confidence: low
  description: "A promise chain or async operation lacks proper error handling. Unhandled promise rejections can silently swallow failures, cause unexpected agent termination, and propagate errors to dependent workflows."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: '\.then'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Promise chain without error handler — unhandled rejection risk"
