id: AA-CF-077
info:
  name: "Resource starvation propagation"
  domain: cascading-failures
  severity: high
  confidence: low
  description: "Resource pools (connection pools, thread pools, memory pools) are shared between components without isolation. Exhaustion in one component starves all others."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "(pool|connection_pool|thread_pool|worker_pool)\\s*=\\s*\\w+(?!.*per_agent|.*isolated|.*dedicated|.*separate)"
  language: any
  message: "Shared resource pool — starvation propagation risk"
