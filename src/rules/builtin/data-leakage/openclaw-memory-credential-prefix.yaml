id: AA-DL-134
info:
  name: "OpenClaw MEMORY.md contains provider-prefixed credential"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "MEMORY.md contains a credential with a known provider prefix (sk-, ghp_, AKIA, eyJ) — high-confidence credential in memory poisoning surface"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(?:password|api.?key|token)\\s*[=:]\\s*(?:sk-|ghp_|AKIA|eyJ)[\\w\\-]{10,}"
  message: "MEMORY.md provider-prefixed credential detected — high-confidence credential leak risk"
