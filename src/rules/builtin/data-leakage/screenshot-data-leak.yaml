id: AA-DL-107
info:
  name: "Screenshot captures sensitive data"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Agent takes screenshots that may capture sensitive information visible on screen. Screenshots containing passwords, private messages, or confidential documents can be exfiltrated."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'screenshot|screen_capture|grab_screen'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Screenshot without redaction — sensitive data capture risk"
