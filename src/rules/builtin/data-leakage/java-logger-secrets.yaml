id: AA-DL-131
info:
  name: "Secrets logged via Java logger"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Secrets (API keys, tokens, passwords) logged via Java logging frameworks (SLF4J, Log4j, java.util.logging). Log files become credential theft targets."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: java
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'log(ger)?\.(info|warn|error|debug)|System\.out\.print(ln)?'
    - field: arguments
      pattern: 'apiKey|api_key|[Tt]oken|[Ss]ecret|[Pp]assword|[Cc]redential'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Secret logged via Java logger — credential exposure"
