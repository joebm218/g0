id: AA-DL-099
info:
  name: "Model weights accessible via API"
  domain: data-leakage
  severity: critical
  confidence: medium
  description: "Model weights or parameters are accessible through an API endpoint. Model weights are proprietary assets whose exposure enables model theft and attack planning."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0024]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: 'model\.parameters|state_dict|model\.weights|model\.get_weights'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Model weights/parameters exposed — IP theft risk"
