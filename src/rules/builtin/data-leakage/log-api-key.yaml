id: AA-DL-089
info:
  name: "API key logged in request/response"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "API keys or authentication tokens are logged as part of HTTP request or response logging. Log files become a credential theft target."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI03]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'log(ger)?\.(info|debug|warn|error|log)'
    - field: arguments
      pattern: 'Authorization|Bearer|api_key|apiKey|x-api-key'
  context:
    not_in: [comment, string_literal, decorator]
  message: "API key or auth header logged — credential exposure"
