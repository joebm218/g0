id: AA-DL-061
info:
  name: "PII Logging Detected"
  domain: data-leakage
  severity: high
  confidence: low
  description: "Potential PII logged — risk of data exposure"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'log(ger)?\.(info|debug|warn|error)'
    - field: arguments
      pattern: 'email|phone|ssn|address|pii|sensitive_data'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Potential PII logged — risk of data exposure"
