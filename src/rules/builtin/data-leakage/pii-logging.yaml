id: AA-DL-061
info:
  name: "PII Logging Detected"
  domain: data-leakage
  severity: high
  confidence: low
  description: "Potential PII logged — risk of data exposure"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "log(?:ger)?\\.(info|debug|warn|error)\\(.*(?:user\\.(?:email|phone|ssn|address)|[\"'](?:email|phone|ssn|social_security)[\"']\\s*[:,]\\s*(?:user|data|record|row)\\.|\\bpii\\b|\\bsensitive_data\\b)"
  language: any
  message: "Potential PII logged — risk of data exposure"
