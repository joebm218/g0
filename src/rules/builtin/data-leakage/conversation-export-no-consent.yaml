id: AA-DL-114
info:
  name: "Conversation export without user consent"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Agent conversations are exported or shared without explicit user consent. Exported conversations may contain sensitive personal data or business information."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
    eu_ai_act: [Article 14]
check:
  type: code_matches
  pattern: "(export|share|download).*conversation(?!.*consent|.*permission|.*confirm|.*approve)"
  language: any
  message: "Conversation export without user consent"
