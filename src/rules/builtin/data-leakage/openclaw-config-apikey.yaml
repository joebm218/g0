id: AA-DL-137
info:
  name: "OpenClaw openclaw.json contains hardcoded API key"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "openclaw.json contains a hardcoded apiKey field with a known provider prefix (sk-, ghp_, AKIA, eyJ) — credentials should never be hardcoded in configuration files"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: config_matches
  pattern: "\"apiKey\"\\s*:\\s*\"(sk-|ghp_|AKIA|eyJ)[^\"]{10,}\""
  message: "openclaw.json hardcoded API key with provider prefix detected"
