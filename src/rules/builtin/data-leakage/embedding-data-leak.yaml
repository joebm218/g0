id: AA-DL-091
info:
  name: "Sensitive data in embedding requests"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Sensitive text is sent to external embedding APIs. The embedding provider can see the plaintext content, which may include PII, trade secrets, or confidential information."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'embed|encode|get_embedding|create_embedding'
    - field: arguments
      pattern: 'password|secret|ssn|credit|confidential'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Sensitive data sent to embedding API — provider data exposure"
