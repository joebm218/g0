id: AA-DL-109
info:
  name: "Environment variables dumped"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "Code dumps all environment variables which may include API keys, database credentials, and secrets. This is a common exfiltration technique for compromised agents."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression|identifier"
  filters:
    - field: function
      pattern: 'os\.environ|process\.env|System\.getenv|os\.Environ'
  context:
    not_in: [comment, string_literal, decorator]
  message: "All environment variables dumped — credential exposure"
