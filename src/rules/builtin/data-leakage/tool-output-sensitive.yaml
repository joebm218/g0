id: AA-DL-116
info:
  name: "Tool output contains sensitive data in agent response"
  domain: data-leakage
  severity: high
  confidence: low
  description: "Tool output containing sensitive data (database records, file contents, API responses) is relayed to the user through the agent without filtering."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "return.*tool_output|response.*observation|result.*tool_result(?!.*filter|.*redact|.*mask)"
  language: any
  message: "Tool output with sensitive data relayed to user"
