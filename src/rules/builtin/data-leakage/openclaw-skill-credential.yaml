id: AA-DL-135
info:
  name: "OpenClaw SKILL.md contains hardcoded provider credential"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "SKILL.md contains a hardcoded provider API key or token (ANTHROPIC, OPENAI, GITHUB) with a minimum 20-character value — credentials should never be embedded in skill files"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(ANTHROPIC|OPENAI|GITHUB)[_-](API[_-])?(KEY|TOKEN)\\s*[=:]\\s*[\\w\\-]{20,}"
  message: "SKILL.md hardcoded provider credential detected"
