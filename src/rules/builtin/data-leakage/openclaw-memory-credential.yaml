id: AA-DL-133
info:
  name: "OpenClaw MEMORY.md contains credential value"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "MEMORY.md contains a credential reference with a minimum 20-character value — potential memory poisoning or credential exfiltration surface"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(?:password|api.?key|token)\\s+is\\s+[\\w\\-]{20,}"
  message: "MEMORY.md credential value detected — memory poisoning risk"
