id: AA-DL-081
info:
  name: "Stack traces exposed in agent responses"
  domain: data-leakage
  severity: high
  confidence: high
  description: "Error stack traces are included in agent responses to users. Stack traces reveal internal file paths, library versions, and code structure useful for targeted attacks."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: 'err\.stack|traceback\.format|getStackTrace|printStackTrace'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Stack trace exposed in response — information disclosure"
