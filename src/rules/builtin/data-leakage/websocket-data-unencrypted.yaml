id: AA-DL-120
info:
  name: "WebSocket data transmission unencrypted"
  domain: data-leakage
  severity: high
  confidence: low
  description: "Agent communicates over unencrypted WebSocket (ws://) instead of secure WebSocket (wss://). All data transmitted can be intercepted by network attackers."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "[\"']ws://(?!localhost|127\\.0\\.0\\.1)"
  language: any
  message: "WebSocket connection unencrypted — data interception risk"
