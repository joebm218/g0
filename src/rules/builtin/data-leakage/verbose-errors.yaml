id: AA-DL-063
info:
  name: "Verbose Error Output Enabled"
  domain: data-leakage
  severity: medium
  confidence: medium
  description: "Verbose error output enabled — may leak internal details"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(?:verbose|DEBUG)\\s*=\\s*True(?!.*\\b(?:if.*(?:dev|development|local|test)|settings\\.DEBUG)\\b)|traceback\\.(?:print_exc|format_exc)\\s*\\(\\)(?!.*\\b(?:if.*(?:dev|development|local|test)|logger\\.(?:debug|exception))\\b)"
  language: any
  message: "Verbose error output enabled — may leak internal details"
