id: AA-DL-113
info:
  name: "Sensitive data in browser local storage"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Sensitive data (tokens, conversation history, user data) is stored in browser localStorage. localStorage is accessible to any JavaScript on the same origin, including XSS payloads."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'localStorage\.(setItem|set)'
    - field: arguments
      pattern: 'token|secret|password|key|session|conversation|history'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Sensitive data in localStorage — XSS can steal it"
