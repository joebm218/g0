id: AA-DL-130
info:
  name: "Secrets logged via fmt.Printf in Go"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Secrets (API keys, tokens, passwords) printed via fmt.Printf/Println/Sprintf. Go logging often uses fmt package directly, leaking credentials to stdout/stderr."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: go
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'fmt\.(Print|Fprint|Sprint)(f|ln)?'
    - field: arguments
      pattern: 'apiKey|api_key|[Tt]oken|[Ss]ecret|[Pp]assword|[Cc]redential'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Secret logged via fmt.Printf — credential exposure"
