id: AA-DL-095
info:
  name: "Cross-user data leakage"
  domain: data-leakage
  severity: critical
  confidence: low
  description: "Agent does not properly isolate data between users. One user's data, context, or conversation history may leak into another user's session."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(?<!const\\s)(?<!readonly\\s)(global|shared|class_level|static)\\s*(memory|context|history|state|data)\\s*=\\s*(?!Object\\.freeze)"
  language: any
  message: "Shared state variable — cross-user data leakage risk"
