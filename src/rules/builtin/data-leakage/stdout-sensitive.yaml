id: AA-DL-073
info:
  name: "Sensitive Data Printed to Stdout"
  domain: data-leakage
  severity: medium
  confidence: medium
  description: "Sensitive data printed to stdout"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: '^print$|console\.log'
    - field: arguments
      pattern: 'key|token|secret|password'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Sensitive data printed to stdout"
