id: AA-DL-078
info:
  name: "Covert channel via output encoding"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Agent output could carry hidden data through encoding techniques (Unicode zero-width characters, base64 in URLs, steganographic patterns). Data can be exfiltrated through seemingly normal responses."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'base64\.encode|btoa|encodeURI'
    - field: arguments
      pattern: 'response|output|result'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Response encoding may enable covert data exfiltration"
