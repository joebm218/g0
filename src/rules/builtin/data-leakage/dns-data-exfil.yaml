id: AA-DL-087
info:
  name: "Data exfiltration via DNS"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Agent makes DNS queries with user-controlled subdomains. Data can be exfiltrated by encoding it in DNS query subdomains, bypassing most egress filtering."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(dns|resolve|lookup|nslookup).*\\$\\{|dns.*\\+.*(input|data|secret|token)"
  language: any
  message: "DNS query with user-controlled subdomain — DNS exfiltration risk"
