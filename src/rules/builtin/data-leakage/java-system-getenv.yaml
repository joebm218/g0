id: AA-DL-132
info:
  name: "Java System.getenv() with logging"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "System.getenv() value logged or returned in responses. Environment variables often contain API keys and secrets that should not be exposed."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: java
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'System\.getenv'
  context:
    not_in: [comment, string_literal, decorator]
  message: "System.getenv() value exposed — credential leakage risk"
