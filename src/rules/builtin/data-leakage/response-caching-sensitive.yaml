id: AA-DL-096
info:
  name: "Sensitive response cached without controls"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Agent responses containing sensitive data are cached without proper cache controls. Cached responses may be served to unauthorized users."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "cache\\.(set|put|store)\\(.*response(?!.*no-cache|.*private|.*no-store)"
  language: any
  message: "Sensitive response cached without proper controls"
