id: AA-DL-084
info:
  name: "Data exfiltration via email"
  domain: data-leakage
  severity: critical
  confidence: medium
  description: "Agent can send emails with user data or context. An attacker can instruct the agent to email sensitive information to an external address."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'send_email|send_mail|sendmail|smtp'
    - field: arguments
      pattern: 'data|content|result|response|context|memory'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Agent can email data — exfiltration via email risk"
