id: AA-DL-101
info:
  name: "Prompts logged without encryption"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "User prompts are logged in plaintext. Prompt logs contain user queries which may include sensitive information, proprietary data, or PII."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'log(ger)?\.(info|debug|warn|error|log)'
    - field: arguments
      pattern: 'prompt|system_message|instruction'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Prompt content logged unencrypted — system prompt leakage"
