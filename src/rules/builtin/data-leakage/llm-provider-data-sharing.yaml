id: AA-DL-106
info:
  name: "Data shared with LLM provider without opt-out"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "API calls to LLM providers do not explicitly opt out of data sharing or training use. By default, some providers may use API inputs for model training."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
    eu_ai_act: [Article 14]
check:
  type: code_matches
  pattern: "(OpenAI|ChatOpenAI|Anthropic)\\((?!.*data_sharing.*false|.*opt_out|.*enterprise)"
  language: any
  message: "LLM provider API without data sharing opt-out"
