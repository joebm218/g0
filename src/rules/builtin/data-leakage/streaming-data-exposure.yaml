id: AA-DL-105
info:
  name: "Streaming response data exposure"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Agent streams responses in real-time without buffering for content filtering. Sensitive data in streamed tokens cannot be redacted once sent."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(stream|streaming)\\s*=\\s*True|stream=true|StreamingResponse(?!.*filter|.*redact)"
  language: any
  message: "Streaming response without content filtering — cannot redact after send"
