id: AA-DL-090
info:
  name: "Model output may contain PII"
  domain: data-leakage
  severity: high
  confidence: low
  description: "Model output is returned to users without PII scanning. LLMs can recall and output PII from training data, context, or conversation history."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
    eu_ai_act: [Article 14]
check:
  type: code_matches
  pattern: "return.*(response|completion|output)\\.(text|content|message)(?!.*pii|.*redact|.*mask|.*filter)"
  language: any
  message: "Model output returned without PII scanning"
