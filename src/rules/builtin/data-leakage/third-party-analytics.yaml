id: AA-DL-110
info:
  name: "User data sent to third-party analytics"
  domain: data-leakage
  severity: medium
  confidence: medium
  description: "User interaction data is sent to third-party analytics services without user consent. Analytics services receive conversation content, user behavior, and interaction patterns."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
    eu_ai_act: [Article 14]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: '(analytics|segment|mixpanel|amplitude|heap|posthog)\.(track|identify|page)'
    - field: arguments
      pattern: 'user'
  context:
    not_in: [comment, string_literal, decorator]
  message: "User data sent to third-party analytics without consent"
