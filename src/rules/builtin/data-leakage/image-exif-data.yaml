id: AA-DL-117
info:
  name: "Image EXIF data not stripped"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Images processed or served by the agent retain EXIF metadata. EXIF data can contain GPS coordinates, device information, timestamps, and other sensitive metadata."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(image|photo|picture).*\\b(serve|send|return|output)(?!.*strip.*exif|.*remove.*metadata)"
  language: any
  message: "Image served without EXIF stripping — metadata leakage"
