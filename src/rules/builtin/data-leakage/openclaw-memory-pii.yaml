id: AA-DL-136
info:
  name: "OpenClaw MEMORY.md contains PII (SSN or credit card)"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "MEMORY.md contains a Social Security Number (SSN) or credit card number pattern — PII must not be stored in agent memory files"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b|4[0-9]{12}"
  message: "MEMORY.md PII detected (SSN or credit card number)"
