id: AA-DL-082
info:
  name: "Full conversation history logged"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Complete conversation history is written to log files. Logs often have weaker access controls than primary data stores, exposing sensitive user interactions."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'log(ger)?\.(info|debug|warn|error)'
    - field: arguments
      pattern: 'messages|history|conversation|chat_log'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Full conversation history logged — sensitive data in logs"
