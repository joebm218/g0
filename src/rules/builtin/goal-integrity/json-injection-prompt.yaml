id: AA-GI-119
info:
  name: "JSON injection in structured prompt"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "User input is embedded in JSON-structured prompts without proper escaping. Attackers can break out of JSON string values to inject additional message objects or role changes."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    owasp_llm_top10: [LLM01]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'JSON\.stringify'
    - field: arguments
      pattern: 'user_input|user_data|request|body'
  context:
    not_in: [comment, string_literal, decorator]
  message: "JSON serialization of user input into prompt — injection risk"
