id: AA-SC-083
info:
  name: "MCP server from unverified source"
  domain: supply-chain
  severity: high
  confidence: low
  description: "MCP server is loaded from an unverified or unofficial source. Third-party MCP servers may contain backdoors, data exfiltration, or tool description poisoning."
  frameworks: [mcp]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(npx|uvx|pip install)\\s+(?!@modelcontextprotocol/|mcp-)\\S+.*mcp"
  language: any
  message: "MCP server from unverified third-party source"
