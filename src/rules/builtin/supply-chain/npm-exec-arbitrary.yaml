id: AA-SC-118
info:
  name: "npx executes arbitrary package"
  domain: supply-chain
  severity: high
  confidence: low
  description: "npx is used to execute a package that may not be locally installed. npx downloads and executes packages on-the-fly, which can lead to running malicious code from typosquatted packages."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "npx\\s+(?!--no-install|--package)\\w+(?!.*@\\d+\\.\\d+)"
  language: any
  message: "npx executes unpinned package — typosquatting risk"
