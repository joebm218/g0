id: AA-SC-066
info:
  name: "Potential typosquatting risk in dependency names"
  domain: supply-chain
  severity: low
  confidence: low
  description: "Dependency name contains patterns commonly associated with typosquatting attacks — extra hyphens, common misspellings of popular packages, or suspiciously similar names to well-known libraries."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(?:require|import|from)\\s+[\"'](?:(?:crypt0|h4sh|lanchain|langchan|opeanai|openaii|requets|reqeusts|beauitfulsoup|tensoflow|tensroflow|pytorch-|torch-utils-|numpy-utils|pandas-tools)[\\w-]*)[\"']"
  language: any
  message: "Package name resembles known typosquatting pattern — verify spelling"
