id: AA-SC-087
info:
  name: "HuggingFace model without verification"
  domain: supply-chain
  severity: high
  confidence: low
  description: "Model is loaded from HuggingFace Hub without verifying the author or using a gated/trusted source. Malicious models on HuggingFace can execute arbitrary code during loading."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    mitre_atlas: [AML.T0010]
check:
  type: code_matches
  pattern: "(from_pretrained|pipeline|AutoModel|AutoTokenizer)\\([\"'](?!meta-llama|openai|google|microsoft|facebook)"
  language: python
  message: "HuggingFace model from unverified author — malicious model risk"
