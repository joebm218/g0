id: AA-SC-072
info:
  name: "requirements.txt without hash verification"
  domain: supply-chain
  severity: low
  confidence: low
  description: "requirements.txt dependencies are installed without hash verification (--require-hashes). Without hash pinning, a compromised PyPI mirror or MITM attack can substitute packages with malicious versions."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "pip\\s+install(?!.*--require-hashes)|^\\s*-r\\s+requirements"
  language: any
  message: "pip install without --require-hashes flag"
