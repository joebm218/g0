id: AA-SC-103
info:
  name: "WebAssembly module from unverified source"
  domain: supply-chain
  severity: high
  confidence: medium
  description: "WebAssembly module is loaded from an unverified source. Malicious WASM modules can execute native-speed code with access to allocated memory."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'WebAssembly\.instantiate|wasm\.load|wasmtime'
  context:
    not_in: [comment, string_literal, decorator]
  message: "WASM module loaded from unverified source"
