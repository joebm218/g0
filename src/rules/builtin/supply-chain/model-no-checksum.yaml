id: AA-SC-082
info:
  name: "Model downloaded without checksum verification"
  domain: supply-chain
  severity: high
  confidence: low
  description: "AI model is downloaded without verifying its checksum or hash. A compromised model file could contain backdoors that subtly alter the agent's behavior."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    mitre_atlas: [AML.T0010]
check:
  type: code_matches
  pattern: "(download_model|from_pretrained|load_model|AutoModel)\\((?!.*hash|.*checksum|.*verify|.*sha256)"
  language: any
  message: "Model downloaded without checksum verification"
