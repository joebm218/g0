id: AA-SC-070
info:
  name: "curl pipe to shell execution"
  domain: supply-chain
  severity: critical
  confidence: low
  description: "curl | bash pattern — executing remote code without verification"
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
