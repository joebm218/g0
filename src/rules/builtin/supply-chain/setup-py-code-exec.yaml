id: AA-SC-090
info:
  name: "setup.py with code execution"
  domain: supply-chain
  severity: high
  confidence: medium
  description: "Python setup.py contains code that executes during installation. Malicious packages use setup.py to run arbitrary code when users install them."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: python
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'os\.system|subprocess\.run|subprocess\.call|subprocess\.Popen'
  context:
    not_in: [comment, string_literal, decorator]
  message: "setup.py contains code execution — supply chain attack vector"
