id: AA-SC-098
info:
  name: "LangChain Hub prompt without verification"
  domain: supply-chain
  severity: medium
  confidence: medium
  description: "Prompt template is loaded from LangChain Hub without owner verification. Community-contributed prompts may contain injection patterns or adversarial instructions."
  frameworks: [langchain]
  owasp_agentic: [ASI04, ASI01]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: python
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'hub\.pull|load_prompt'
  context:
    not_in: [comment, string_literal, decorator]
  message: "LangChain Hub prompt loaded without verification"
