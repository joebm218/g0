id: AA-SC-121
info:
  name: "OpenClaw safeBins bypass (CVE-2026-28363)"
  domain: supply-chain
  severity: critical
  confidence: high
  description: "openclaw.json or SKILL.md sets safeBins:false, bypassing the binary allowlist and enabling non-allowlisted binary execution (CVE-2026-28363)"
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: config_matches
  pattern: "\"safeBins\"\\s*:\\s*false"
  message: "OpenClaw safeBins:false disables binary allowlist — CVE-2026-28363"
