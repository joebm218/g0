id: AA-SC-084
info:
  name: "Missing lockfile for dependency resolution"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "Project installs dependencies without a lockfile (package-lock.json, yarn.lock, poetry.lock). Without a lockfile, builds are non-deterministic and vulnerable to dependency substitution."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(npm install|pip install|yarn)(?!.*--frozen|.*--ci|.*--locked|.*-lock)"
  language: any
  message: "Dependency install without lockfile enforcement"
