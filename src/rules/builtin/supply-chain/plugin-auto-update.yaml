id: AA-SC-105
info:
  name: "Plugin auto-update without verification"
  domain: supply-chain
  severity: high
  confidence: low
  description: "Agent plugins or extensions auto-update without integrity verification. An attacker who compromises the update server can push malicious plugin updates."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(auto.update|update.*plugin|self.update|check.*update)(?!.*verify|.*sign|.*hash|.*checksum)"
  language: any
  message: "Plugin auto-updates without integrity verification"
