id: AA-SC-060
info:
  name: "Maven Central unsigned/unverified artifact"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "Maven dependency without checksum verification. Without signature verification, compromised Maven Central mirrors or local repositories can inject malicious artifacts."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.7]
check:
  type: code_matches
  pattern: "<repository>[^<]*<url>http://(?!localhost)|allowInsecureProtocol\\s*=\\s*true|mavenLocal\\(\\)"
  language: any
  message: "Insecure Maven repository — unsigned artifact risk"
