id: AA-SC-076
info:
  name: "Unpinned AI model version"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "AI model is referenced without a specific version pin. Model behavior can change between versions, and an attacker who compromises the model registry can replace models."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "model\\s*=\\s*[\"'](gpt-4|gpt-3\\.5|claude|llama|gemini)[\"'](?!.*version|.*-\\d{4}|.*-v\\d)"
  language: any
  message: "AI model referenced without version pin"
