id: AA-SC-088
info:
  name: "Model loaded from pickle format"
  domain: supply-chain
  severity: critical
  confidence: high
  description: "Model is loaded from pickle (.pkl, .pickle) format which allows arbitrary code execution during deserialization. An attacker can embed malicious code in a pickled model file."
  frameworks: [all]
  owasp_agentic: [ASI04, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    mitre_atlas: [AML.T0010]
check:
  type: ast_matches
  language: python
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'pickle_load|torch\.load|joblib\.load'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Model loaded from unsafe format — code run during load"
