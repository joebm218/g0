id: AA-SC-114
info:
  name: "LoRA adapter from unverified source"
  domain: supply-chain
  severity: high
  confidence: low
  description: "LoRA adapter weights are loaded from an unverified source. Malicious LoRA adapters can subtly alter model behavior to introduce backdoors or biases."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    mitre_atlas: [AML.T0010]
check:
  type: code_matches
  pattern: "(load_adapter|PeftModel|lora_weights|adapter_path)\\(.*(?!.*verify|.*hash)"
  language: any
  message: "LoRA adapter loaded without verification — model tampering risk"
