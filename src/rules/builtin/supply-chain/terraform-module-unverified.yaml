id: AA-SC-108
info:
  name: "Terraform module from unverified source"
  domain: supply-chain
  severity: high
  confidence: low
  description: "Terraform module is sourced from an unverified registry or git repository. Malicious Terraform modules can provision backdoored infrastructure."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "source\\s*=\\s*[\"'](?!registry\\.terraform\\.io|hashicorp/).*[\"']"
  language: any
  message: "Terraform module from unverified source"
