id: AA-SC-092
info:
  name: "Docker image without digest"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "Docker image is referenced by tag instead of digest (sha256). Image tags are mutable and can be repointed to a different image, including malicious ones."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(FROM|image:)\\s+[\\w/.-]+:[\\w.-]+(?!@sha256:)"
  language: any
  message: "Docker image referenced by tag without digest"
