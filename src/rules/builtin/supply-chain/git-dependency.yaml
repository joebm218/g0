id: AA-SC-091
info:
  name: "Dependency pinned to git branch"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "Dependency is pinned to a git branch or latest commit instead of a specific tag or commit SHA. Branch references are mutable and can be changed by the repository owner."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(git\\+|github\\.com/).*@(main|master|develop|HEAD)(?![a-f0-9]{7})"
  language: any
  message: "Git dependency pinned to mutable branch — not reproducible"
