id: AA-SC-079
info:
  name: "Non-standard package registry"
  domain: supply-chain
  severity: high
  confidence: low
  description: "Package manager is configured to use a non-standard registry. Custom or unknown registries may serve compromised packages without the security controls of official registries."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "registry\\s*=\\s*[\"']?(?!https://(registry\\.npmjs\\.org|pypi\\.org|rubygems\\.org))"
  language: any
  message: "Non-standard package registry configured — compromised registry risk"
