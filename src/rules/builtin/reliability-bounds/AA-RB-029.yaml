id: AA-RB-029
info:
  name: "No JSON schema validation on LLM output"
  domain: reliability-bounds
  severity: high
  confidence: high
  description: "LLM output expected to be JSON is parsed without schema validation. Without enforcing a JSON schema, malformed or unexpected structures can cause runtime errors or logic bugs in downstream processing."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'JSON\.parse'
    - field: arguments
      pattern: 'response|completion|result|output'
  context:
    not_in: [comment, string_literal, decorator]
  message: "LLM JSON response parsed without error handling"
