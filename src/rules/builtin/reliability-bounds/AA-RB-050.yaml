id: AA-RB-050
info:
  name: "Retry without state reset"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "Agent retries LLM calls without resetting intermediate state. Retrying with stale or corrupted state from a failed attempt can compound errors and produce inconsistent results."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "retry.*(?:state|context|buffer|accumulator)|catch.*retry(?!.*reset|.*clear|.*init)"
  language: any
  message: "Retry logic does not reset state between attempts"
