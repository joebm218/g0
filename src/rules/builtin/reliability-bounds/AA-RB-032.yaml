id: AA-RB-032
info:
  name: "Unvalidated structured output from LLM"
  domain: reliability-bounds
  severity: high
  confidence: low
  description: "Structured data extracted from LLM output (objects, arrays, nested fields) is used without validation against an expected schema. Unvalidated structured output can contain missing fields, extra properties, or wrong types."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
    owasp_llm_top10: [LLM09]
check:
  type: code_matches
  pattern: "\\.tool_calls|function_call\\.arguments|structured_output(?!.*valid)"
  language: any
  message: "Structured LLM output used without schema validation"
