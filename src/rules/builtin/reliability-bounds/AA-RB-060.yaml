id: AA-RB-060
info:
  name: "Cost estimation missing before expensive operations"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "Agent does not estimate costs before executing expensive LLM operations. Without pre-execution cost estimation, batch operations or long-context calls can trigger unexpectedly high bills."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2, MANAGE-2.3]
check:
  type: code_matches
  pattern: "estimat.*cost|cost.*estimat|predict.*usage|pre.*calcul.*token|token.*count.*before"
  language: any
  message: "No cost estimation performed before expensive LLM operations"
