id: AA-RB-030
info:
  name: "Missing output format verification"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "LLM output is consumed without verifying it matches the expected format. Even when prompted for a specific format, LLMs may return free-text, partial formats, or wrapped content that breaks parsers."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "format_instructions|output_parser|structured_output"
  language: any
  message: "Output format not verified after LLM generation"
