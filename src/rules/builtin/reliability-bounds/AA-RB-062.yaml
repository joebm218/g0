id: AA-RB-062
info:
  name: "Temperature not explicitly set"
  domain: reliability-bounds
  severity: medium
  confidence: high
  description: "LLM API calls do not explicitly set the temperature parameter. Default temperature varies by provider and can change, leading to inconsistent behavior across deployments or after API updates."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.5]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: 'chat\.completions\.create|openai\.chat|client\.chat'
  context:
    not_in: [comment, string_literal, decorator]
  message: "LLM API call without retry or fallback strategy"
