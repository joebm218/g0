id: AA-RB-080
info:
  name: "Burst traffic not controlled"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "Rate limiter does not control burst traffic patterns. Token bucket or sliding window without burst control allows sudden spikes that can overwhelm the LLM provider and trigger errors."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "burst.*limit|max.*burst|burst.*size|token.*bucket|leaky.*bucket|burst.*control"
  language: any
  message: "Rate limiter does not control burst traffic"
