id: AA-RB-110
info:
  name: "Unbounded thread pool in Java agent"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "Executors.newCachedThreadPool() or unbounded thread pools in agent code. Each agent request spawning a new thread can exhaust system resources under load."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: java
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'Executors\.newCachedThreadPool|Executors\.newFixedThreadPool'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Unbounded thread pool — resource exhaustion risk"
