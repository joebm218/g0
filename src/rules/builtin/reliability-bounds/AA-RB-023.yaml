id: AA-RB-023
info:
  name: "No grounding verification for LLM output"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "LLM output is not grounded against any knowledge base or retrieval source. Without grounding verification, the model may generate plausible but entirely fabricated information."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
    owasp_llm_top10: [LLM09]
check:
  type: prompt_missing
  pattern: "ground|retriev|knowledge.?base|citation|source.?document"
  language: any
  message: "LLM output lacks grounding verification against known sources"
