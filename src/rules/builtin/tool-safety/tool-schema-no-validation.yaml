id: AA-TS-081
info:
  name: "Tool schema without input validation"
  domain: tool-safety
  severity: high
  confidence: low
  description: "Tool schema defines parameters without type constraints, enum restrictions, or pattern validation. Without schema-level validation, the agent can pass arbitrary values to tool parameters."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "parameters.*type.*string(?!.*enum|.*pattern|.*maxLength|.*format)"
  language: any
  message: "Tool parameter schema lacks input validation constraints"
