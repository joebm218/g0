id: AA-TS-159
info:
  name: "Tool with bulk data export capability"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool can export large amounts of data in bulk. A compromised agent could export entire databases, user lists, or document repositories for exfiltration."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'dump_all|backup_database|extract_all|download_all|bulk_download|mysqldump|pg_dump|mongodump'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool has bulk data export capability — mass data exfiltration risk"
