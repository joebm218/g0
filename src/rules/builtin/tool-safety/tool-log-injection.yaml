id: AA-TS-129
info:
  name: "Log injection via tool parameters"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool parameters are logged without sanitization. An attacker can inject CRLF sequences or ANSI escape codes into logs to forge log entries or exploit log viewers."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'log(ger)?\.(info|debug|warn|error)'
    - field: arguments
      pattern: 'input|param|arg|query|user'
  context:
    not_in: [comment, string_literal, decorator]
  message: "User input logged without sanitization — log injection risk"
