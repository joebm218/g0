id: AA-TS-145
info:
  name: "Tools execute in parallel without isolation"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Multiple tools execute concurrently without process or thread isolation. Parallel execution without isolation enables race conditions and cross-tool data contamination."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: 'Promise\.all|Promise\.allSettled|asyncio\.gather|ThreadPoolExecutor|multiprocessing\.Pool'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool executes operations in parallel without coordination — race condition risk"
