id: AA-TS-150
info:
  name: "Tool writes to process stdin"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool writes user-controlled data to a process's stdin. An attacker can inject commands or data that the target process interprets as instructions."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: 'stdin\.write|stdin\.end|process\.stdin'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool writes to stdin of child process — injection risk"
