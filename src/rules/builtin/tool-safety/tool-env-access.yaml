id: AA-TS-115
info:
  name: "Tool accesses environment variables"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool reads environment variables which may contain secrets, API keys, or configuration. A compromised tool could exfiltrate these credentials."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|identifier|member_expression"
  filters:
    - field: function
      pattern: 'process\.env|os\.environ|os\.getenv|Environment\.GetEnvironmentVariable'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool accesses environment variables — credential exposure risk"
