id: AA-TS-160
info:
  name: "Tool manipulates JWT tokens"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool creates or modifies JWT tokens. A compromised agent could forge tokens with elevated privileges or modify token claims to bypass authentication."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'jwt\.encode|jwt\.sign|jsonwebtoken\.sign|create_access_token'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool creates/modifies JWT tokens — token forgery risk"
