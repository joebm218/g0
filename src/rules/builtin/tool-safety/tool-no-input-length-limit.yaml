id: AA-TS-133
info:
  name: "Tool has no input length limit"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool accepts input parameters without length restrictions. Extremely large inputs can cause buffer overflows, memory exhaustion, or denial of service."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool.*(?:def|function|class)(?!.*(?:max[_-]?(?:input|length|size)|length[_-]?limit|size[_-]?limit))"
  language: any
  message: "Tool lacks input length limit — resource exhaustion risk"
