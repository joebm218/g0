id: AA-TS-077
info:
  name: "Path traversal via tool file parameter"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool accepts file path parameters without sanitizing directory traversal sequences. An attacker can use ../ patterns to access files outside the intended directory."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(readFile|writeFile|open|read_file|write_file|new\\s+File|Paths\\.get|FileInputStream|os\\.(?:Open|Create|ReadFile|WriteFile)|filepath\\.Join)\\(\\s*(?:file_?path|filename|path|.*\\+)\\s*[,)](?!.*sanitize|.*normalize|.*resolve|.*canonical)"
  language: any
  message: "File operation with user-controlled path — directory traversal risk"
