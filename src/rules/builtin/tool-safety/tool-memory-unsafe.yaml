id: AA-TS-114
info:
  name: "Tool uses memory-unsafe operations"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool uses memory-unsafe operations like ctypes, cffi, or native bindings. Memory corruption vulnerabilities in tool implementations can lead to arbitrary code execution."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|identifier"
  filters:
    - field: function
      pattern: 'ctypes\.|cffi\.|ffi\.cdef|ffi\.new|Buffer\.allocUnsafe|allocUnsafeSlow|POINTER|byref|addressof'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool uses memory-unsafe operations"
