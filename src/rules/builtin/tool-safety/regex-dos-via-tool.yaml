id: AA-TS-103
info:
  name: "ReDoS via tool parameter"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool uses user-controlled input as a regular expression pattern. An attacker can craft evil regex patterns that cause catastrophic backtracking, leading to denial of service."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 're\.compile|re\.match|re\.search|re\.findall|RegExp'
    - field: arguments
      pattern: 'input|param|user|query|pattern'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Regex with user input — ReDoS risk"
