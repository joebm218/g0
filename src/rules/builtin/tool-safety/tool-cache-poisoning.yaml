id: AA-TS-148
info:
  name: "Tool cache poisoning risk"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool caches results without validating cache integrity. An attacker can poison the cache with malicious data that is served to subsequent requests."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'cache\.set|cache\.put|redis\.set|memcached\.set'
    - field: arguments
      pattern: 'input|param|user|request'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool caches user-controlled data without integrity check — cache poisoning risk"
