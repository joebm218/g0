id: AA-TS-095
info:
  name: "SSRF to cloud metadata endpoint"
  domain: tool-safety
  severity: critical
  confidence: low
  description: "Tool makes HTTP requests without blocking access to cloud metadata endpoints (169.254.169.254, metadata.google.internal). An attacker can access cloud instance credentials via SSRF."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(fetch|requests|axios|urllib|httpx)\\((?!.*169\\.254|.*metadata\\.google|.*block|.*deny)"
  language: any
  message: "HTTP tool does not block cloud metadata endpoints — credential theft risk"
