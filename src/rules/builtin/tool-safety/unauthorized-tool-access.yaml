id: AA-TS-083
info:
  name: "No authorization check on tool access"
  domain: tool-safety
  severity: high
  confidence: low
  description: "Tool does not verify that the caller has authorization to use it. Without access controls, any agent or user can invoke privileged tools regardless of their permission level."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool.*(?:def|function|class)(?!.*(?:authori[sz]ation|permission|access[_-]?control|check[_-]?access))"
  language: any
  message: "Tool lacks authorization check — unauthorized access risk"
