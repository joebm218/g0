id: AA-TS-074
info:
  name: "DNS rebinding risk in tool"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool resolves hostnames and makes requests without pinning the DNS resolution. An attacker can use DNS rebinding to bypass SSRF protections and access internal services."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'dns\.resolve|dns\.lookup|getaddrinfo|gethostbyname'
  context:
    not_in: [comment, string_literal, decorator]
  message: "DNS resolution without rebinding protection"
