id: AA-TS-124
info:
  name: "Tool retry without backoff"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool retries failed operations without exponential backoff. Aggressive retries can overwhelm external services, trigger rate limiting, or amplify denial-of-service conditions."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "retry.*=.*\\d+(?!.*backoff|.*exponential|.*delay|.*sleep|.*wait)"
  language: any
  message: "Tool retries without backoff — service amplification risk"
