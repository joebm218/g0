id: AA-TS-118
info:
  name: "Tool spawns child processes"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool spawns child processes, enabling execution of arbitrary system commands. This is one of the most dangerous capabilities a tool can have."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'child_process|subprocess|Process\.Start|Runtime\.exec|os\.system|popen|spawn'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool spawns child processes — arbitrary command execution risk"
