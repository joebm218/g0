id: AA-TS-137
info:
  name: "Tool can take screenshots"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool can capture screenshots of the screen or browser. Screenshots may capture sensitive information including passwords, private messages, or confidential documents."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'screenshot|screen_capture|pyautogui\.screenshot|page\.screenshot'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool can capture screenshots — sensitive data exposure risk"
