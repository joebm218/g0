id: AA-TS-167
info:
  name: "Tool has no cost limit"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool can invoke paid APIs or provision billable resources without a cost limit. A compromised agent could rack up significant costs through excessive API calls or resource provisioning."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool.*(?:def|function|class)(?!.*(?:cost[_-]?limit|max[_-]?cost|budget|spending[_-]?limit))"
  language: any
  message: "Tool lacks cost limit — financial risk from excessive usage"
