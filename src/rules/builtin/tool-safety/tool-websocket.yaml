id: AA-TS-116
info:
  name: "Tool uses WebSocket connections"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool establishes WebSocket connections which maintain persistent bidirectional communication. WebSocket connections bypass traditional HTTP security controls and can be used for data exfiltration."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|new_expression"
  filters:
    - field: function
      pattern: 'WebSocket|ws\.connect|io\.connect|socket\.io|websockets\.connect'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool uses WebSocket connections — persistent communication channel"
