id: AA-TS-088
info:
  name: "No confirmation for destructive tool actions"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Destructive tool operations (delete, drop, overwrite, terminate) execute without requiring user confirmation. A single misrouted agent action could cause irreversible damage."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    eu_ai_act: [Article 14]
check:
  type: code_matches
  pattern: "(?:tool|agent|execute|action|client|service|db|table|collection|bucket|store|resource|manager)\\s*[\\.\\[]\\s*(?:delete|drop|truncate|destroy|terminate|overwrite)\\s*\\((?!.*(?:confirm|approval|verify|test|mock|spec|fixture))"
  language: any
  message: "Destructive tool action without confirmation requirement"
