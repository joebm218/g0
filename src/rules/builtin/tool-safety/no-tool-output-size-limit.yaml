id: AA-TS-094
info:
  name: "No tool output size limit"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool output is not limited in size before being returned to the agent. A tool returning excessive data can overflow the agent's context window, causing truncation of system instructions."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool.*(?:def|function|class)(?!.*(?:max[_-]?output|output[_-]?(?:limit|size)|truncat))"
  language: any
  message: "Tool lacks output size limit — context overflow risk"
