id: AA-TS-168
info:
  name: "Unsafe JSON parsing in tool"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool parses JSON from external sources without size limits or depth restrictions. An attacker can craft deeply nested or extremely large JSON payloads to cause stack overflow or memory exhaustion."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'JSON\.parse|json\.loads'
    - field: arguments
      pattern: 'response|body|data|result'
  context:
    not_in: [comment, string_literal, decorator]
  message: "JSON parsing without size/depth limits — DoS risk"
