id: AA-TS-084
info:
  name: "Tool output not sanitized before agent consumption"
  domain: tool-safety
  severity: high
  confidence: low
  description: "Tool output is passed directly to the agent without sanitization. Malicious external services can return responses containing prompt injection payloads that alter the agent's behavior."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool_output|function_response|observation.*=.*result(?!.*sanitize|.*filter|.*clean|.*strip)"
  language: any
  message: "Tool output fed to agent without sanitization — output injection risk"
