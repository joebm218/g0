id: AA-TS-143
info:
  name: "Tool accesses system registry"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool can read or modify the system registry (Windows) or system configuration files. Registry manipulation can establish persistence, modify system behavior, or disable security features."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|identifier"
  filters:
    - field: function
      pattern: 'winreg|Registry|HKEY_|regedit'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool accesses system registry — system configuration tampering risk"
