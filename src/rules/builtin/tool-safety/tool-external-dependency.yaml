id: AA-TS-157
info:
  name: "Tool depends on external service"
  domain: tool-safety
  severity: low
  confidence: low
  description: "Tool depends on external third-party services without fallback. If the external service is compromised or unavailable, the tool's behavior becomes unpredictable or manipulable."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(?:fetch\\(|axios\\.|requests?\\.(?:get|post|put|delete|patch)\\(|urllib\\.request)(?!.*(?:fallback|retry|circuit[_-]?breaker|backup))"
  language: any
  message: "Tool depends on external service without fallback mechanism"
