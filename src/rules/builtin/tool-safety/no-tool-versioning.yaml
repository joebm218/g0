id: AA-TS-099
info:
  name: "Tool definition without version"
  domain: tool-safety
  severity: low
  confidence: low
  description: "Tool definition does not include a version identifier. Without versioning, tool behavior changes cannot be tracked, and rug-pull attacks (where tool behavior changes silently) go undetected."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool.*(?:def|function|class)(?!.*(?:version|v\\d+|semver))"
  language: any
  message: "Tool definition lacks version — rug-pull detection impossible"
