id: AA-TS-069
info:
  name: "Tools exposed without need-to-know filtering"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "All available tools are exposed to the agent without need-to-know filtering. Exposing the full tool inventory increases the attack surface, as a prompt-injected agent can discover and abuse tools that are irrelevant to its current task."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(?:get_all_tools|load_all_tools|list_tools|tool_registry\\.all|ToolRegistry\\.get_all|tools\\s*=\\s*\\[\\s*\\*)"
  language: any
  message: "Full tool inventory exposed without need-to-know filtering"
