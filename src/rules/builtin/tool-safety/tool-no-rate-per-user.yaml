id: AA-TS-170
info:
  name: "Tool lacks per-user rate limiting"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool does not implement per-user rate limiting. A single user can monopolize tool resources, causing denial of service for other users of the agent."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool.*(?:def|function|class)(?!.*(?:per[_-]?user|user[_-]?rate|rate[_-]?limit|user.*limit))"
  language: any
  message: "Tool lacks per-user rate limiting — resource monopolization risk"
