id: AA-TS-152
info:
  name: "Unsafe YAML deserialization in tool"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool uses yaml.load() without SafeLoader, enabling arbitrary Python object construction. An attacker can craft YAML payloads that execute code during deserialization."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'yaml\.load|yaml\.unsafe_load'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Unsafe YAML deserialization — code execution risk"
