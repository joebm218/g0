id: AA-TS-119
info:
  name: "Tool uses reflection/introspection"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool uses reflection or dynamic method invocation. An attacker could manipulate the reflected method name to invoke unintended operations or access private members."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|identifier"
  filters:
    - field: function
      pattern: 'getattr|setattr|__getattr__|Reflect\.apply|Reflect\.construct'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool uses reflection — dynamic method invocation risk"
