id: AA-TS-125
info:
  name: "Tool handles file uploads"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool accepts file uploads without restricting file type, size, or content. An attacker can upload malicious files (web shells, executables) through the agent."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'upload|multipart|FormData|multer|busboy|file\.save'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool handles file uploads without type/size restrictions"
