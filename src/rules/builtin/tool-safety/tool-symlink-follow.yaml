id: AA-TS-141
info:
  name: "Tool follows symbolic links"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool performs file operations that follow symbolic links. An attacker can create symlinks to sensitive files (e.g., /etc/passwd, .env) that the tool will read or modify."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(readFile|open|read)\\((?!.*followSymlinks.*false|.*O_NOFOLLOW|.*lstat)"
  language: any
  message: "File operation follows symbolic links — symlink attack risk"
