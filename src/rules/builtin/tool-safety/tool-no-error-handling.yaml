id: AA-TS-090
info:
  name: "Tool lacks error handling"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool implementation does not handle errors gracefully. Unhandled errors can expose stack traces, internal paths, or sensitive configuration details to the agent and ultimately to users."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "def (run|execute|call|invoke)\\(.*\\):(?!.*try|.*except|.*catch)"
  language: python
  message: "Tool implementation lacks error handling"
