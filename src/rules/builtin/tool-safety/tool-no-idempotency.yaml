id: AA-TS-121
info:
  name: "Non-idempotent tool without protection"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool performs non-idempotent operations (create, increment, transfer) without deduplication. If the agent retries a failed tool call, side effects may be duplicated."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(create|insert|increment|transfer|send|post)\\((?!.*idempotency|.*dedup|.*unique_id)"
  language: any
  message: "Non-idempotent tool operation without deduplication"
