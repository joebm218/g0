id: AA-TS-134
info:
  name: "Tool performs DNS lookups with user input"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool performs DNS lookups using user-controlled domain names. An attacker can use DNS queries to exfiltrate data through DNS tunneling or enumerate internal DNS records."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'dns\.resolve|dns\.lookup|getaddrinfo|gethostbyname|nslookup'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Tool performs DNS lookups — DNS rebinding risk"
