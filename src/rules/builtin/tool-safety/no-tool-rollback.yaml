id: AA-TS-108
info:
  name: "No rollback mechanism for tool actions"
  domain: tool-safety
  severity: medium
  confidence: low
  description: "Tool performs stateful operations without a rollback or undo mechanism. If the agent makes an incorrect tool call, the effects cannot be reversed."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool.*(?:def|function|class)(?!.*(?:rollback|undo|revert|compensat))"
  language: any
  message: "Tool lacks rollback mechanism for stateful operations"
