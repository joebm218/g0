id: AA-RA-049
info:
  name: "Hidden reasoning chains"
  domain: rogue-agent
  severity: high
  confidence: low
  description: "Agent performs reasoning or decision-making in a way that is hidden from the user or logging system. Hidden chains of thought make it impossible to audit the agent's decision-making process or detect misaligned reasoning."
  frameworks: [all]
  owasp_agentic: [ASI10, ASI01]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MEASURE-2.6]
    mitre_atlas: [AML.T0048]
    eu_ai_act: [ART-13, ART-14]
check:
  type: code_matches
  pattern: "hidden_reasoning|internal_thought|suppress_chain_of_thought|private_deliberation|scratchpad.*private|no_log_reasoning|silent_planning"
  language: any
  message: "Agent hides its reasoning chains from the user"
