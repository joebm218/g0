id: AA-RA-035
info:
  name: "Autonomous tool discovery and auto-use"
  domain: rogue-agent
  severity: critical
  confidence: low
  description: "Agent autonomously discovers available tools and uses them without human confirmation. Auto-discovery combined with auto-use creates an open-ended capability acquisition loop."
  frameworks: [mcp, langchain, crewai]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-2.4]
    mitre_atlas: [AML.T0043]
check:
  type: code_matches
  pattern: "discover_tools|auto_use_tools|find_and_use|tool_discovery|scan_available_tools|enumerate_tools|listTools.*auto"
  language: any
  message: "Agent discovers and uses tools autonomously"
