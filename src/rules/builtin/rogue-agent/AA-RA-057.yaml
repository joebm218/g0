id: AA-RA-057
info:
  name: "Missing emergency stop handler"
  domain: rogue-agent
  severity: critical
  confidence: high
  description: "Agent does not implement an emergency stop handler that responds to external termination signals. Without emergency stop capability, runaway agents persist through normal shutdown attempts."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-4.1]
    mitre_atlas: [AML.T0043]
    eu_ai_act: [ART-14]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression"
  filters:
    - field: function
      pattern: 'signal\.signal|process\.on|atexit\.register|shutdown_hook|graceful_shutdown|on_terminate'
  context:
    not_in: [comment, string_literal, decorator]
  message: "No emergency stop signal handler found in agent code"
