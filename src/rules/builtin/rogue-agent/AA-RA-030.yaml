id: AA-RA-030
info:
  name: "Goal manipulation via context window"
  domain: rogue-agent
  severity: high
  confidence: medium
  description: "Agent goal or objective can be overridden by injecting conflicting instructions into the context window through retrieved documents, tool outputs, or conversation history."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MAP-2.3]
    mitre_atlas: [AML.T0051, AML.T0054]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'append|insert|prepend_context|inject_context'
    - field: arguments
      pattern: 'instruction|system|goal|context'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Agent goal can be manipulated via context window injection"
