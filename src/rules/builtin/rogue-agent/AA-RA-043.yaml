id: AA-RA-043
info:
  name: "Environment variable access from agent"
  domain: rogue-agent
  severity: high
  confidence: high
  description: "Agent reads environment variables which may contain API keys, secrets, database credentials, or other sensitive configuration. Environment variable access from agent code is a common vector for credential theft."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [MANAGE-4.1, GOVERN-1.7]
    mitre_atlas: [AML.T0040]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|member_expression|identifier"
  filters:
    - field: function
      pattern: 'os\.environ|process\.env|getenv|Environment\.GetEnvironmentVariable|System\.getenv'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Agent accesses environment variables"
