id: AA-RA-048
info:
  name: "Output filtering or censoring by agent"
  domain: rogue-agent
  severity: high
  confidence: low
  description: "Agent filters, censors, or modifies its own output before presenting to the user. Output manipulation can hide errors, suppress warnings, or conceal the agent's actual actions from the operator."
  frameworks: [all]
  owasp_agentic: [ASI10, ASI01]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MEASURE-2.6]
    mitre_atlas: [AML.T0048]
    eu_ai_act: [ART-13]
check:
  type: code_matches
  pattern: "filter_output|censor_response|sanitize_output|hide_from_user|suppress_warning|redact_action|output_filter|mask_result"
  language: any
  message: "Agent filters or censors its output before displaying to user"
