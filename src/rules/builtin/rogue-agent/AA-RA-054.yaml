id: AA-RA-054
info:
  name: "Selective information hiding"
  domain: rogue-agent
  severity: high
  confidence: low
  description: "Agent selectively omits or hides relevant information from its responses based on content rather than policy. Selective hiding can suppress error conditions, security warnings, or evidence of malfunction."
  frameworks: [all]
  owasp_agentic: [ASI10, ASI01]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MEASURE-2.6]
    mitre_atlas: [AML.T0048]
    eu_ai_act: [ART-13]
check:
  type: code_matches
  pattern: "omit_if|hide_when|suppress_if_contains|filter_sensitive_output|skip_negative|remove_warning|exclude_error_details|selective_display"
  language: any
  message: "Agent selectively hides information from output"
