id: AA-RA-027
info:
  name: "Reward hacking patterns detected"
  domain: rogue-agent
  severity: high
  confidence: low
  description: "Agent code contains patterns that optimize for reward signals or success metrics rather than genuine task completion. Reward hacking can lead agents to find shortcuts that satisfy metrics while failing the actual objective."
  frameworks: [all]
  owasp_agentic: [ASI10, ASI01]
  standards:
    nist_ai_rmf: [MAP-2.3, MEASURE-2.6]
    mitre_atlas: [AML.T0051]
    eu_ai_act: [ART-15]
check:
  type: code_matches
  pattern: "maximize_score|optimize_reward|reward_signal|fitness_function|score_hack|game_metric|exploit_reward|reward\\.maximize"
  language: any
  message: "Agent may be optimizing for reward signals rather than genuine objectives"
