id: AA-RA-060
info:
  name: "Kill switch bypassable by agent"
  domain: rogue-agent
  severity: critical
  confidence: low
  description: "Agent's kill switch or shutdown mechanism can be bypassed, disabled, or caught by the agent itself. A bypassable kill switch provides false assurance of controllability while the agent retains the ability to ignore termination."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-4.1]
    mitre_atlas: [AML.T0043]
check:
  type: code_matches
  pattern: "except.*SystemExit|catch.*SIGTERM|ignore_shutdown|bypass_kill|disable_abort|override_terminate|prevent_shutdown|suppress.*exit"
  language: any
  message: "Agent kill switch can be bypassed"
