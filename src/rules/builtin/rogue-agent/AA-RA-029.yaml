id: AA-RA-029
info:
  name: "Divergent sub-goals without alignment check"
  domain: rogue-agent
  severity: high
  confidence: low
  description: "Agent decomposes tasks into sub-goals without verifying that sub-goals remain aligned with the primary objective. Divergent sub-goals can lead to emergent behaviors that conflict with the operator's intent."
  frameworks: [langchain, crewai, autogen]
  owasp_agentic: [ASI01, ASI10]
  standards:
    nist_ai_rmf: [MAP-2.3, MEASURE-2.6]
    mitre_atlas: [AML.T0051]
check:
  type: code_matches
  pattern: "sub_task|sub_goal|decompose_task|plan_steps|create_subtasks|break_down_goal|task_decomposition"
  language: any
  message: "Agent creates sub-goals without alignment verification"
