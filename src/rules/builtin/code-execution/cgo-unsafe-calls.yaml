id: AA-CE-033
info:
  name: "cgo/unsafe pointer operations"
  domain: code-execution
  severity: high
  confidence: medium
  description: "Use of cgo C.free, unsafe.Pointer casts, or reflect.SliceHeader bypasses Go's memory safety. In agent contexts, this opens the door to memory corruption exploits."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: go
  node_type: "call_expression|call|identifier"
  filters:
    - field: function
      pattern: 'C\.free|unsafe\.Pointer|reflect\.SliceHeader|reflect\.StringHeader'
  context:
    not_in: [comment, string_literal, decorator]
  message: "cgo/unsafe pointer operations — memory safety bypass"
