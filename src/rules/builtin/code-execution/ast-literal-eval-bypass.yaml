id: AA-CE-080
info:
  name: "ast.literal_eval with non-literal input"
  domain: code-execution
  severity: medium
  confidence: medium
  description: "ast.literal_eval is used but the input may contain non-literal expressions. While safer than eval(), ast.literal_eval has had CVEs and edge cases that allow code execution."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: python
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'ast\.literal_eval'
    - field: arguments
      pattern: 'input|request|body|data|user|query'
  context:
    not_in: [comment, string_literal, decorator]
  message: "ast.literal_eval with user input — edge case bypass risk"
