id: AA-CE-073
info:
  name: "WebAssembly instantiation"
  domain: code-execution
  severity: medium
  confidence: medium
  description: "WebAssembly instantiation — verify source trust"
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'WebAssembly\.(instantiate|compile)|wasm\.instantiate'
  context:
    not_in: [comment, string_literal, decorator]
  message: "WebAssembly instantiation — verify source trust"
