id: AA-CE-063
info:
  name: "exec() usage detected"
  domain: code-execution
  severity: critical
  confidence: high
  description: "exec() usage — arbitrary code execution"
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "\\bexec\\s*\\(|Runtime\\.getRuntime\\(\\)\\.exec\\(|ProcessBuilder\\s*\\(|exec\\.Command\\(|os\\.system\\(|os\\.popen\\(|child_process|execSync\\(|spawnSync\\("
  language: any
  message: "Direct code/command execution — exec, os.system, child_process, Runtime.exec"
