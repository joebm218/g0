id: AA-CE-063
info:
  name: "exec() usage detected"
  domain: code-execution
  severity: critical
  confidence: high
  description: "exec() usage — arbitrary code execution"
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: '^exec$|Runtime\.getRuntime|ProcessBuilder|os\.system|os\.popen|execSync|spawnSync'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Direct code/command execution — exec, os.system, child_process, Runtime.exec"
