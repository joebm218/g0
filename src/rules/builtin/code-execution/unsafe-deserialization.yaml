id: AA-CE-064
info:
  name: "Unsafe deserialization"
  domain: code-execution
  severity: critical
  confidence: high
  description: "Unsafe deserialization — risk of arbitrary code execution"
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'yaml\.unsafe_load|marshal\.loads?|ObjectInputStream|XMLDecoder|gob\.NewDecoder'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Unsafe deserialization — risk of arbitrary code execution"
