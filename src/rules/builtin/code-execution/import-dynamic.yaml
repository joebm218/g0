id: AA-CE-071
info:
  name: "Dynamic import detected"
  domain: code-execution
  severity: high
  confidence: medium
  description: "Dynamic import — risk of loading malicious modules"
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: '__import__|importlib\.import_module'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Dynamic import — risk of loading malicious modules"
