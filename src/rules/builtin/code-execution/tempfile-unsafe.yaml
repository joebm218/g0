id: AA-CE-069
info:
  name: "Insecure temporary file usage"
  domain: code-execution
  severity: medium
  confidence: high
  description: "Insecure temporary file usage"
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'tempfile\.mktemp'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Insecure temporary file usage"
