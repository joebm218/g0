id: AA-CE-078
info:
  name: "VM context escape risk"
  domain: code-execution
  severity: critical
  confidence: medium
  description: "Code uses Node.js vm module or Python exec() in a supposedly sandboxed context. Both are known to be escapable and do not provide true isolation."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: any
  node_type: "call_expression|call|new_expression|identifier"
  filters:
    - field: function
      pattern: 'vm\.createContext|vm\.runInContext|vm\.Script|vm\.Module|vm2|isolated-vm'
  context:
    not_in: [comment, string_literal, decorator]
  message: "VM context sandbox — known escape vectors exist"
