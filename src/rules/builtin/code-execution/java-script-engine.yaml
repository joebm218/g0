id: AA-CE-035
info:
  name: "Java ScriptEngine with dynamic input"
  domain: code-execution
  severity: critical
  confidence: high
  description: "ScriptEngine.eval() with user-controlled input enables arbitrary code execution. Agents using ScriptEngine for dynamic evaluation are vulnerable to code injection."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: ast_matches
  language: java
  node_type: "call_expression|call"
  filters:
    - field: function
      pattern: 'ScriptEngine.*\.eval|ScriptEngineManager|GraalVM.*eval'
  context:
    not_in: [comment, string_literal, decorator]
  message: "Java ScriptEngine.eval() — arbitrary code execution risk"
