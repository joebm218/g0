name: Release to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm test

      - run: npm run build

      - run: npm install -g npm@latest

      - run: npm publish --access public --provenance

      - name: Publish OpenClaw plugin
        working-directory: packages/g0-openclaw-plugin
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view @guard0/g0-openclaw-plugin version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "OpenClaw plugin v${LOCAL_VERSION} already published — skipping"
          else
            echo "Publishing OpenClaw plugin v${LOCAL_VERSION} (registry has v${REMOTE_VERSION})"
            npm run build
            npm publish --access public --provenance
          fi

  notify:
    name: Notify Slack
    needs: [publish]
    runs-on: ubuntu-latest
    if: failure()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
    steps:
      - name: Notify Slack - Fail
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Release Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "❌ Release Failed", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Ref:*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"},
                    { "type": "mrkdwn", "text": "*Event:*\n${{ github.event_name }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Logs" },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "danger"
                    }
                  ]
                }
              ]
            }
